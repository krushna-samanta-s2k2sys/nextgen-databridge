apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    user: nextgen_databridge
    secureJsonData:
      password: nextgen_databridge
    jsonData:
      database: nextgen_databridge_audit
      sslmode: disable
      maxOpenConns: 10
      postgresVersion: 1500
      timescaledb: false
