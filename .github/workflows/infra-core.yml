name: Infrastructure — Core

# Manages VPC, EKS, S3, ECR, ElastiCache, and MWAA Airflow.
# Does NOT manage any database (PostgreSQL or SQL Server) — use infra-audit-db.yml
# and infra-source-db.yml for those.
#
# DR support: set environment=dr to deploy into us-west-2.
#
# Required GitHub Environments (Settings → Environments):
#   dev, staging, production, dr
#   Add Required Reviewers to staging/production/dr to gate apply/destroy.
#
# No passwords are required — no databases are provisioned by this workflow.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production, dr]
      action:
        description: Action to perform
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "~1.6"
  PRIMARY_REGION: us-east-1
  DR_REGION: us-west-2
  STATE_BUCKET: nextgen-databridge-terraform-state
  LOCK_TABLE: nextgen-databridge-terraform-locks
  # IAM role ARNs — not secrets, just resource identifiers. Update per account.
  ROLE_ARN_DEV:        arn:aws:iam::877707676590:role/nextgen-databridge-github-actions-dev
  ROLE_ARN_STAGING:    arn:aws:iam::STAGING_ACCOUNT_ID:role/nextgen-databridge-github-actions-staging
  ROLE_ARN_PROD:       arn:aws:iam::PROD_ACCOUNT_ID:role/nextgen-databridge-github-actions-production
  ROLE_ARN_DR:         arn:aws:iam::DR_ACCOUNT_ID:role/nextgen-databridge-github-actions-dr

jobs:
  # ── Resolve per-environment config ──────────────────────────────────────────
  setup:
    name: "Setup (${{ inputs.environment }} / ${{ inputs.action }})"
    runs-on: ubuntu-latest
    outputs:
      aws_region: ${{ steps.cfg.outputs.aws_region }}
      role_arn:   ${{ steps.cfg.outputs.role_arn }}
    steps:
      - name: Resolve config
        id: cfg
        run: |
          case "${{ inputs.environment }}" in
            dev)        ROLE="${{ env.ROLE_ARN_DEV }}" ;;
            staging)    ROLE="${{ env.ROLE_ARN_STAGING }}" ;;
            production) ROLE="${{ env.ROLE_ARN_PROD }}" ;;
            dr)         ROLE="${{ env.ROLE_ARN_DR }}" ;;
          esac
          REGION=$([[ "${{ inputs.environment }}" == "dr" ]] \
            && echo "${{ env.DR_REGION }}" \
            || echo "${{ env.PRIMARY_REGION }}")
          echo "aws_region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "role_arn=${ROLE}"     >> "$GITHUB_OUTPUT"

  # ── Bootstrap Terraform backend ──────────────────────────────────────────────
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - name: Ensure S3 state bucket + DynamoDB lock table
        run: |
          BUCKET="${{ env.STATE_BUCKET }}"
          TABLE="${{ env.LOCK_TABLE }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" --region us-east-1 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region us-east-1
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              '{"BlockPublicAcls":true,"IgnorePublicAcls":true,"BlockPublicPolicy":true,"RestrictPublicBuckets":true}'
            echo "Created state bucket: $BUCKET"
          else
            echo "State bucket exists: $BUCKET"
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE" --region us-east-1 2>/dev/null; then
            aws dynamodb create-table \
              --table-name "$TABLE" --region us-east-1 \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE" --region us-east-1
            echo "Created DynamoDB lock table: $TABLE"
          else
            echo "DynamoDB lock table exists: $TABLE"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # PLAN — core
  # ════════════════════════════════════════════════════════════════════════════

  plan-core:
    name: Plan — core
    runs-on: ubuntu-latest
    needs: [setup, bootstrap]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform init
        working-directory: infra/terraform/core
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/core/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"
      - name: terraform plan
        working-directory: infra/terraform/core
        run: |
          set -o pipefail
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ needs.setup.outputs.aws_region }}" \
            ${{ inputs.action == 'destroy' && '-destroy' || '' }} \
            -out=tfplan-core.bin -no-color 2>&1 | tee tfplan-core.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-core
          path: |
            infra/terraform/core/tfplan-core.bin
            infra/terraform/core/tfplan-core.txt
          retention-days: 1
      - name: Post plan summary
        if: always()
        run: |
          {
            echo "### Terraform Plan — core \`${{ inputs.environment }}\`"
            echo '```hcl'
            cat infra/terraform/core/tfplan-core.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # PLAN — mwaa (runs after apply-core so it can see new VPC/EKS outputs;
  #              when action=plan, apply-core is skipped and this still runs)
  plan-mwaa:
    name: Plan — mwaa
    runs-on: ubuntu-latest
    needs: [setup, apply-core]
    if: |
      always() &&
      (needs.apply-core.result == 'success' || needs.apply-core.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform init
        working-directory: infra/terraform/mwaa
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/mwaa/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"
      - name: terraform plan
        working-directory: infra/terraform/mwaa
        run: |
          set -o pipefail
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ needs.setup.outputs.aws_region }}" \
            ${{ inputs.action == 'destroy' && '-destroy' || '' }} \
            -out=tfplan-mwaa.bin -no-color 2>&1 | tee tfplan-mwaa.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-mwaa
          path: |
            infra/terraform/mwaa/tfplan-mwaa.bin
            infra/terraform/mwaa/tfplan-mwaa.txt
            infra/terraform/mwaa/plugins.zip
          retention-days: 1
      - name: Post plan summary
        if: always()
        run: |
          {
            echo "### Terraform Plan — mwaa \`${{ inputs.environment }}\`"
            echo '```hcl'
            cat infra/terraform/mwaa/tfplan-mwaa.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY / DESTROY — gated by GitHub Environment approval
  # ════════════════════════════════════════════════════════════════════════════

  apply-core:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }} — core"
    runs-on: ubuntu-latest
    needs: [setup, plan-core]
    if: inputs.action != 'plan' && needs.plan-core.result == 'success'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-core
          path: infra/terraform/core/
      - name: terraform init
        working-directory: infra/terraform/core
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/core/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"
      - name: terraform apply
        working-directory: infra/terraform/core
        run: terraform apply -auto-approve tfplan-core.bin
      - name: Upload pipeline configs
        if: inputs.action == 'apply'
        run: |
          BUCKET="nextgen-databridge-pipeline-configs-${{ inputs.environment }}"
          aws s3 cp configs/environments/${{ inputs.environment }}.json \
            s3://${BUCKET}/environments/${{ inputs.environment }}.json 2>/dev/null || true
          for f in configs/pipelines/*.json; do
            aws s3 cp "$f" s3://${BUCKET}/active/$(basename "$f") 2>/dev/null || true
          done

  apply-mwaa:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }} — mwaa"
    runs-on: ubuntu-latest
    needs: [setup, plan-mwaa, apply-core]
    if: |
      inputs.action != 'plan' &&
      needs.plan-mwaa.result == 'success' &&
      (needs.apply-core.result == 'success' || needs.apply-core.result == 'skipped')
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-mwaa
          path: infra/terraform/mwaa/
      - name: terraform init
        working-directory: infra/terraform/mwaa
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/mwaa/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"
      - name: terraform apply
        working-directory: infra/terraform/mwaa
        run: terraform apply -auto-approve tfplan-mwaa.bin
      - name: Upload DAGs to MWAA bucket
        if: inputs.action == 'apply'
        run: |
          MWAA_BUCKET=$(cd infra/terraform/mwaa && terraform output -raw mwaa_bucket)
          MWAA_BUCKET="$MWAA_BUCKET" bash airflow/deploy_to_mwaa.sh

  # ── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [setup, apply-core, apply-mwaa]
    if: always() && inputs.action != 'plan'
    steps:
      - name: Write summary
        run: |
          {
            echo "## Core Infrastructure — ${{ inputs.action }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Region | \`${{ needs.setup.outputs.aws_region }}\` |"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "| Module | Result |"
            echo "|---|---|"
            echo "| core | ${{ needs.apply-core.result }} |"
            echo "| mwaa | ${{ needs.apply-mwaa.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
