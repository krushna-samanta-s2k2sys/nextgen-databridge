name: Deploy — DR (Disaster Recovery)

# Deploys the production-validated image to the DR region (us-west-2).
# Can be triggered manually at any time or automatically when production health
# checks fail (wire up via a separate monitoring workflow or external alert).
#
# DR strategy:
#   • Primary region:  us-east-1 (production)
#   • DR region:       us-west-2
#   • Images sourced from production ECR (us-east-1), replicated to DR ECR (us-west-2)
#   • All Terraform modules deployed to us-west-2 with environment=dr
#   • Optional Route 53 DNS failover activation (flips traffic from primary to DR)
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN_DEV       — SSM reads (image tag lives here)
#   AWS_ROLE_ARN_PROD      — pull images from production ECR
#   AWS_ROLE_ARN_DR        — deploy to DR region; may be same or different AWS account
#   DB_PASSWORD, MSSQL_PASSWORD
#   SLACK_WEBHOOK_URL (optional)
#
# Required GitHub Environment:
#   dr — with required reviewers (or omit protection for auto-failover)
#
# Terraform note:
#   variables.tf must include "dr" in the environment validation list.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave blank to use current production tag from SSM)"
        required: false
        default: ""
      activate_dns_failover:
        description: "Activate Route 53 DNS failover (switch traffic to DR)"
        required: false
        type: boolean
        default: false
      reason:
        description: "Reason for DR activation (for audit log)"
        required: false
        default: "Manual DR deployment"

  # Uncomment to allow triggering from other workflows (e.g. a health-monitor workflow)
  # workflow_call:
  #   inputs:
  #     image_tag:
  #       type: string
  #       required: false
  #     activate_dns_failover:
  #       type: boolean
  #       required: false
  #       default: false

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: dr
  PRIMARY_REGION: us-east-1
  DR_REGION: us-west-2
  TF_VERSION: "~1.6"
  STATE_BUCKET: nextgen-databridge-terraform-state
  LOCK_TABLE: nextgen-databridge-terraform-locks
  DR_CLUSTER_NAME: nextgen-databridge-dr

jobs:
  # ── 1. Resolve which production image to deploy to DR ────────────────────────
  resolve-image-tag:
    name: Resolve Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Configure AWS credentials (dev — SSM lives in dev account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Resolve image tag from SSM or input
        id: resolve
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAG="${{ inputs.image_tag }}"
            echo "Using manually specified tag: $TAG"
          else
            TAG=$(aws ssm get-parameter \
              --name "/nextgen-databridge/image-tag/production" \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            echo "Using production tag from SSM: $TAG"
          fi
          [[ -z "$TAG" ]] && {
            echo "ERROR: No production image tag found in SSM."
            echo "Deploy to production first, or specify a tag explicitly."
            exit 1
          }
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log DR activation
        run: |
          echo "DR Activation — ${{ github.run_id }}"
          echo "Reason:    ${{ inputs.reason }}"
          echo "Image tag: ${{ steps.resolve.outputs.image_tag }}"
          echo "Actor:     ${{ github.actor }}"
          echo "DNS Failover: ${{ inputs.activate_dns_failover }}"

  # ── 2. Copy production images to DR ECR (us-west-2) ─────────────────────────
  copy-images-to-dr:
    name: Copy ECR Images to DR Region
    runs-on: ubuntu-latest
    needs: resolve-image-tag
    outputs:
      dr_registry: ${{ steps.push.outputs.dr_registry }}
    steps:
      - name: Configure AWS credentials (prod — pull source images from prod ECR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Get production ECR token + pull images
        id: pull
        run: |
          PROD_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          PROD_REGISTRY="${PROD_ACCOUNT}.dkr.ecr.${{ env.PRIMARY_REGION }}.amazonaws.com"
          PROD_TOKEN=$(aws ecr get-login-password --region ${{ env.PRIMARY_REGION }})
          echo "::add-mask::${PROD_TOKEN}"
          echo "prod_registry=${PROD_REGISTRY}" >> "$GITHUB_OUTPUT"

          echo "${PROD_TOKEN}" | docker login \
            --username AWS --password-stdin "${PROD_REGISTRY}"

          TAG="${{ needs.resolve-image-tag.outputs.image_tag }}"
          for svc in api ui transform; do
            docker pull "${PROD_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
          done

      - name: Configure AWS credentials (DR — push to DR ECR in us-west-2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - name: Ensure DR ECR repositories exist
        run: |
          for svc in api ui transform; do
            aws ecr describe-repositories \
              --repository-names "nextgen-databridge/${svc}" \
              --region ${{ env.DR_REGION }} 2>/dev/null \
            || aws ecr create-repository \
              --repository-name "nextgen-databridge/${svc}" \
              --region ${{ env.DR_REGION }} \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
          done

      - name: Tag + push to DR ECR
        id: push
        env:
          PROD_REGISTRY: ${{ steps.pull.outputs.prod_registry }}
          TAG: ${{ needs.resolve-image-tag.outputs.image_tag }}
        run: |
          DR_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          DR_REGISTRY="${DR_ACCOUNT}.dkr.ecr.${{ env.DR_REGION }}.amazonaws.com"
          echo "dr_registry=${DR_REGISTRY}" >> "$GITHUB_OUTPUT"

          aws ecr get-login-password --region ${{ env.DR_REGION }} | \
            docker login --username AWS --password-stdin "${DR_REGISTRY}"

          for svc in api ui transform; do
            docker tag "${PROD_REGISTRY}/nextgen-databridge/${svc}:${TAG}" \
                       "${DR_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
            docker tag "${PROD_REGISTRY}/nextgen-databridge/${svc}:${TAG}" \
                       "${DR_REGISTRY}/nextgen-databridge/${svc}:dr"
            docker push "${DR_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
            docker push "${DR_REGISTRY}/nextgen-databridge/${svc}:dr"
            echo "Pushed: nextgen-databridge/${svc}:${TAG} → DR"
          done

  # ── 3. Bootstrap DR Terraform backend ────────────────────────────────────────
  bootstrap-dr:
    name: Bootstrap DR Terraform Backend
    runs-on: ubuntu-latest
    needs: resolve-image-tag
    steps:
      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - name: Ensure state bucket + DynamoDB lock table
        run: |
          BUCKET="${{ env.STATE_BUCKET }}"
          TABLE="${{ env.LOCK_TABLE }}"

          # State bucket (hosted in us-east-1, accessible cross-region)
          if ! aws s3api head-bucket --bucket "$BUCKET" --region us-east-1 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region us-east-1
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              '{"BlockPublicAcls":true,"IgnorePublicAcls":true,"BlockPublicPolicy":true,"RestrictPublicBuckets":true}'
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" --region us-east-1 2>/dev/null; then
            aws dynamodb create-table \
              --table-name "$TABLE" --region us-east-1 \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE" --region us-east-1
          fi

  # ── 4. Core infrastructure in DR region ──────────────────────────────────────
  deploy-core-dr:
    name: Deploy Core Infra — DR
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, copy-images-to-dr, bootstrap-dr]
    environment: dr
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/core
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/dr/core/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/core
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.DR_REGION }}"

      - name: Upload pipeline configs to DR S3
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="nextgen-databridge-pipeline-configs-dr-${ACCOUNT}"
          # Use production configs for DR (DR mirrors production)
          aws s3 cp configs/environments/production.json \
            s3://${BUCKET}/environments/dr.json 2>/dev/null || true
          for f in configs/pipelines/*.json; do
            aws s3 cp "$f" s3://${BUCKET}/active/$(basename "$f") 2>/dev/null || true
          done

  # ── 5. WWI + MWAA in DR region (parallel after core) ─────────────────────────
  deploy-wwi-dr:
    name: Deploy WideWorldImporters — DR
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, deploy-core-dr]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/wwi
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/dr/wwi/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/wwi
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.DR_REGION }}"

  deploy-mwaa-dr:
    name: Deploy MWAA Airflow — DR
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, deploy-core-dr]
    outputs:
      mwaa_url: ${{ steps.mwaa-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/mwaa
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/dr/mwaa/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/mwaa
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.DR_REGION }}"

      - name: Upload DAGs
        run: |
          MWAA_BUCKET=$(cd infra/terraform/mwaa && terraform output -raw mwaa_bucket)
          MWAA_BUCKET="$MWAA_BUCKET" bash airflow/deploy_to_mwaa.sh

      - name: Get MWAA URL
        id: mwaa-url
        run: |
          URL=$(aws mwaa get-environment \
            --name "nextgen-databridge-${{ env.ENVIRONMENT }}" \
            --query "Environment.WebserverUrl" \
            --output text 2>/dev/null || echo "pending")
          echo "url=https://${URL}" >> "$GITHUB_OUTPUT"

  # ── 6. Deploy EKS applications to DR cluster ─────────────────────────────────
  deploy-apps-dr:
    name: "Deploy EKS Apps — DR @ ${{ needs.resolve-image-tag.outputs.image_tag }}"
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, copy-images-to-dr, deploy-core-dr, deploy-mwaa-dr]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig (DR cluster)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.DR_REGION }} \
            --name ${{ env.DR_CLUSTER_NAME }}

      - name: Resolve dynamic values
        id: resolve
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          DR_REGISTRY="${ACCOUNT}.dkr.ecr.${{ env.DR_REGION }}.amazonaws.com"
          echo "account=${ACCOUNT}"       >> "$GITHUB_OUTPUT"
          echo "dr_registry=${DR_REGISTRY}" >> "$GITHUB_OUTPUT"

          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "nextgen-databridge/connections/audit_db" \
            --query SecretString --output text 2>/dev/null || echo '{"url":""}')
          DB_URL=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); print(d.get('url',''))" "$DB_SECRET")
          echo "::add-mask::${DB_URL}"
          echo "database_url=${DB_URL}" >> "$GITHUB_OUTPUT"

          MWAA_URL="${{ needs.deploy-mwaa-dr.outputs.mwaa_url }}"
          echo "airflow_url=${MWAA_URL}" >> "$GITHUB_OUTPUT"

          DUCKDB_BUCKET="nextgen-databridge-duckdb-store-dr-${ACCOUNT}"
          CONFIGS_BUCKET="nextgen-databridge-pipeline-configs-dr-${ACCOUNT}"
          echo "duckdb_bucket=${DUCKDB_BUCKET}"   >> "$GITHUB_OUTPUT"
          echo "configs_bucket=${CONFIGS_BUCKET}" >> "$GITHUB_OUTPUT"

      - name: Apply Kubernetes manifests to DR cluster
        env:
          IMAGE_TAG: ${{ needs.resolve-image-tag.outputs.image_tag }}
          REGISTRY: ${{ steps.resolve.outputs.dr_registry }}
          ACCOUNT: ${{ steps.resolve.outputs.account }}
          DATABASE_URL: ${{ steps.resolve.outputs.database_url }}
          AIRFLOW_URL: ${{ steps.resolve.outputs.airflow_url }}
          DUCKDB_BUCKET: ${{ steps.resolve.outputs.duckdb_bucket }}
          CONFIGS_BUCKET: ${{ steps.resolve.outputs.configs_bucket }}
        run: |
          sed \
            -e "s|__ACCOUNT_ID__|${ACCOUNT}|g" \
            -e "s|__REGISTRY__|${REGISTRY}|g" \
            -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
            -e "s|__ENVIRONMENT__|${{ env.ENVIRONMENT }}|g" \
            -e "s|__DUCKDB_BUCKET__|${DUCKDB_BUCKET}|g" \
            -e "s|__PIPELINE_CONFIGS_BUCKET__|${CONFIGS_BUCKET}|g" \
            -e "s|__DATABASE_URL__|${DATABASE_URL}|g" \
            -e "s|__AIRFLOW_URL__|${AIRFLOW_URL}|g" \
            -e "s|__API_SECRET_KEY__|nextgen-databridge-dr-${IMAGE_TAG}|g" \
            eks/manifests/platform.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nextgen-databridge-api \
            -n nextgen-databridge --timeout=300s
          kubectl rollout status deployment/nextgen-databridge-ui \
            -n nextgen-databridge --timeout=180s

      - name: Print DR service endpoints
        run: |
          echo "=== DR Cluster Endpoints ==="
          kubectl get svc -n nextgen-databridge \
            -o custom-columns='NAME:.metadata.name,EXTERNAL-IP:.status.loadBalancer.ingress[0].hostname,PORT:.spec.ports[0].port' \
            2>/dev/null || true

  # ── 7. Smoke tests against DR endpoints ──────────────────────────────────────
  smoke-test-dr:
    name: Smoke Tests — DR
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, deploy-apps-dr]
    steps:
      - name: Configure AWS credentials (DR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DR }}
          aws-region: ${{ env.DR_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig (DR cluster)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.DR_REGION }} \
            --name ${{ env.DR_CLUSTER_NAME }}

      - name: Wait for pods to be ready
        run: |
          kubectl wait pod -n nextgen-databridge \
            --for=condition=Ready \
            --selector=app=nextgen-databridge-api \
            --timeout=180s

      - name: Health check — DR API
        run: |
          API_HOST=$(kubectl get svc nextgen-databridge-api-lb \
            -n nextgen-databridge \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [[ -n "$API_HOST" ]]; then
            for i in {1..12}; do
              HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                "http://${API_HOST}/health" 2>/dev/null || echo "000")
              if [[ "$HTTP_STATUS" == "200" ]]; then
                echo "DR API health check passed (attempt $i)"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 15s..."
              sleep 15
            done
            [[ "$HTTP_STATUS" == "200" ]] || { echo "ERROR: DR API health check failed"; exit 1; }
          else
            echo "Load balancer not yet provisioned — pod-level check only"
            kubectl get pods -n nextgen-databridge
          fi

  # ── 8. Optional: activate Route 53 DNS failover ───────────────────────────────
  dns-failover:
    name: Activate Route 53 DNS Failover
    runs-on: ubuntu-latest
    needs: [smoke-test-dr]
    if: inputs.activate_dns_failover == true
    environment: dr
    steps:
      - name: Configure AWS credentials (prod — Route 53 hosted zone lives in prod account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Switch Route 53 health-check failover to DR
        run: |
          # Retrieve the hosted zone and failover record set IDs.
          # These are expected to be stored in SSM for auditability.
          HOSTED_ZONE_ID=$(aws ssm get-parameter \
            --name "/nextgen-databridge/route53/hosted-zone-id" \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          PRIMARY_HEALTH_CHECK_ID=$(aws ssm get-parameter \
            --name "/nextgen-databridge/route53/primary-health-check-id" \
            --query Parameter.Value --output text 2>/dev/null || echo "")

          if [[ -z "$HOSTED_ZONE_ID" || -z "$PRIMARY_HEALTH_CHECK_ID" ]]; then
            echo "WARNING: Route 53 parameters not found in SSM."
            echo "Set /nextgen-databridge/route53/hosted-zone-id and"
            echo "    /nextgen-databridge/route53/primary-health-check-id to enable DNS failover."
            exit 0
          fi

          # Disable the primary health check to force Route 53 to fail over to DR.
          aws route53 update-health-check \
            --health-check-id "$PRIMARY_HEALTH_CHECK_ID" \
            --disabled

          echo "DNS failover activated. Traffic now routing to DR (us-west-2)."
          echo "To revert: re-enable health check ID $PRIMARY_HEALTH_CHECK_ID"

      - name: Record failover activation in SSM
        run: |
          aws ssm put-parameter \
            --name "/nextgen-databridge/dr/active" \
            --value "true" \
            --type String --overwrite
          aws ssm put-parameter \
            --name "/nextgen-databridge/dr/activated-at" \
            --value "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --type String --overwrite
          aws ssm put-parameter \
            --name "/nextgen-databridge/dr/activated-by" \
            --value "${{ github.actor }}" \
            --type String --overwrite

  # ── 9. Record DR image tag in SSM ────────────────────────────────────────────
  record-image-tag:
    name: Record DR Image Tag
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, smoke-test-dr]
    steps:
      - name: Configure AWS credentials (dev — SSM in dev account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.PRIMARY_REGION }}

      - name: Write DR image tag to SSM
        run: |
          aws ssm put-parameter \
            --name "/nextgen-databridge/image-tag/dr" \
            --value "${{ needs.resolve-image-tag.outputs.image_tag }}" \
            --type String --overwrite
          echo "Recorded DR image tag: ${{ needs.resolve-image-tag.outputs.image_tag }}"

  # ── 10. Summary + notification ────────────────────────────────────────────────
  summary:
    name: DR Deployment Summary
    runs-on: ubuntu-latest
    needs: [resolve-image-tag, deploy-apps-dr, smoke-test-dr, record-image-tag]
    if: always()
    steps:
      - name: Write job summary
        run: |
          OVERALL=$([[ \
            "${{ needs.deploy-apps-dr.result }}" == "success" && \
            "${{ needs.smoke-test-dr.result }}" == "success" \
          ]] && echo "✅ DR Active" || echo "❌ DR Deployment Failed")
          {
            echo "## DR Deployment Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| DR Region | \`${{ env.DR_REGION }}\` |"
            echo "| Image Tag | \`${{ needs.resolve-image-tag.outputs.image_tag }}\` |"
            echo "| DNS Failover | \`${{ inputs.activate_dns_failover }}\` |"
            echo "| Reason | ${{ inputs.reason }} |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Overall | ${OVERALL} |"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Image Copy | ${{ needs.copy-images-to-dr.result }} |"
            echo "| Core Infra | ${{ needs.deploy-core-dr.result }} |"
            echo "| WWI | ${{ needs.deploy-wwi-dr.result }} |"
            echo "| MWAA | ${{ needs.deploy-mwaa-dr.result }} |"
            echo "| EKS Apps | ${{ needs.deploy-apps-dr.result }} |"
            echo "| Smoke Tests | ${{ needs.smoke-test-dr.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy-apps-dr.result == 'success' && ':rotating_light: *DR DEPLOYED*' || ':x: *DR Deployment FAILED*' }} — `${{ needs.resolve-image-tag.outputs.image_tag }}` → us-west-2 — DNS Failover: ${{ inputs.activate_dns_failover }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>",
              "attachments": [{
                "color": "${{ needs.deploy-apps-dr.result == 'success' && 'warning' || 'danger' }}",
                "fields": [
                  { "title": "Reason", "value": "${{ inputs.reason }}", "short": false },
                  { "title": "Activated by", "value": "@${{ github.actor }}", "short": true },
                  { "title": "DNS Failover", "value": "${{ inputs.activate_dns_failover }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
