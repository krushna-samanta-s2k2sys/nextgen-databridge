name: List Versions

# Run this before triggering Promote to see what version IDs are available.
# The job summary shows a table of recent versions with their current environment
# pointers (dev / staging) so you can copy-paste the right version_id.

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of recent versions to list"
        required: false
        default: "10"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ROLE_ARN_DEV: arn:aws:iam::877707676590:role/nextgen-databridge-github-actions-dev

jobs:
  list:
    name: List Available Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch versions from SSM and write summary
        env:
          COUNT: ${{ inputs.count }}
        run: |
          DEV_VER=$(aws ssm get-parameter \
            --name "/nextgen-databridge/deploy/dev/latest-version" \
            --query Parameter.Value --output text 2>/dev/null || echo "—")
          STAGING_VER=$(aws ssm get-parameter \
            --name "/nextgen-databridge/deploy/staging/latest-version" \
            --query Parameter.Value --output text 2>/dev/null || echo "—")
          PARAMS=$(aws ssm get-parameters-by-path \
            --path "/nextgen-databridge/versions/" \
            --recursive \
            --query "Parameters[*].Value" \
            --output json 2>/dev/null || echo "[]")

          DEV_VER="$DEV_VER" STAGING_VER="$STAGING_VER" PARAMS="$PARAMS" \
            python3 .github/scripts/list_versions.py
