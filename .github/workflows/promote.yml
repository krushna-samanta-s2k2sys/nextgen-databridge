name: Promote

# Manual-only promotion of a versioned dev deployment to staging or production.
# Versions are created by deploy-dev.yml and tracked in AWS SSM Parameter Store.
#
# Promotion chain:
#   dev → staging:    any version that completed deploy-dev is eligible
#   staging → prod:   ONLY the version currently live on staging may be promoted;
#                     this prevents skipping staging verification
#
# Selective deployment: each version manifest records which artifacts changed
# (apps / dags / configs). Only those artifacts are re-deployed in the target
# environment — a configs-only version never triggers an image copy or rollout.
#
# No infrastructure is touched in staging or production. All infra is managed
# via the dedicated infra-* workflows.
#
# SSM layout (all written by deploy-dev.yml and this workflow):
#   /nextgen-databridge/versions/{version_id}          — immutable manifest JSON
#   /nextgen-databridge/deploy/{env}/latest-version    — mutable pointer
#   /nextgen-databridge/deploy/{env}/last-deployment   — audit record
#   /nextgen-databridge/image-tag/{env}                — backwards-compat tag
#
# Required GitHub Environments (Settings → Environments):
#   staging    — configure Required Reviewers to gate the deployment
#   production — configure Required Reviewers; restrict to main branch
#
# IAM Role ARNs (resource identifiers, not secrets):
#   ROLE_ARN_DEV, ROLE_ARN_STAGING, ROLE_ARN_PROD
#
# Optional GitHub Secret:
#   SLACK_WEBHOOK_URL — omit to skip Slack notifications

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      version_id:
        description: "Version to promote (e.g. v20260504-145230-abc1234). Leave blank to auto-resolve from the source environment."
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ROLE_ARN_DEV:     arn:aws:iam::877707676590:role/nextgen-databridge-github-actions-dev
  ROLE_ARN_STAGING: arn:aws:iam::STAGING_ACCOUNT_ID:role/nextgen-databridge-github-actions-staging
  ROLE_ARN_PROD:    arn:aws:iam::PROD_ACCOUNT_ID:role/nextgen-databridge-github-actions-production

jobs:
  # ── 1. Resolve version manifest and validate promotion chain ─────────────────
  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version_id:   ${{ steps.cfg.outputs.version_id }}
      sha:          ${{ steps.cfg.outputs.sha }}
      image_tag:    ${{ steps.cfg.outputs.image_tag }}
      deploy_apps:  ${{ steps.cfg.outputs.deploy_apps }}
      sync_dags:    ${{ steps.cfg.outputs.sync_dags }}
      sync_configs: ${{ steps.cfg.outputs.sync_configs }}
      role_arn:     ${{ steps.cfg.outputs.role_arn }}
      cluster_name: ${{ steps.cfg.outputs.cluster_name }}
      source_env:   ${{ steps.cfg.outputs.source_env }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve version and validate chain
        id: cfg
        run: |
          ENV="${{ inputs.environment }}"

          if [[ "$ENV" == "staging" ]]; then
            SOURCE_ENV="dev"
            ROLE="${{ env.ROLE_ARN_STAGING }}"
            CLUSTER="nextgen-databridge-staging"
          else
            SOURCE_ENV="staging"
            ROLE="${{ env.ROLE_ARN_PROD }}"
            CLUSTER="nextgen-databridge-production"
          fi

          # Resolve version_id — explicit input takes precedence
          if [[ -n "${{ inputs.version_id }}" ]]; then
            VERSION_ID="${{ inputs.version_id }}"
            echo "Using specified version: ${VERSION_ID}"
          else
            VERSION_ID=$(aws ssm get-parameter \
              --name "/nextgen-databridge/deploy/${SOURCE_ENV}/latest-version" \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            [[ -z "$VERSION_ID" ]] && {
              echo "ERROR: No version found for ${SOURCE_ENV}. Deploy to ${SOURCE_ENV} first, or specify version_id explicitly."
              exit 1
            }
            echo "Auto-resolved version from ${SOURCE_ENV}: ${VERSION_ID}"
          fi

          # Chain validation: staging→prod requires the version to be live on staging
          if [[ "$ENV" == "production" ]]; then
            STAGING_VERSION=$(aws ssm get-parameter \
              --name "/nextgen-databridge/deploy/staging/latest-version" \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            if [[ "$STAGING_VERSION" != "$VERSION_ID" ]]; then
              echo "ERROR: Chain validation failed."
              echo "  Requested version:       ${VERSION_ID}"
              echo "  Staging current version: ${STAGING_VERSION:-<none>}"
              echo "  Promote ${VERSION_ID} to staging first before promoting to production."
              exit 1
            fi
            echo "Chain validation passed: staging is running ${VERSION_ID}."
          fi

          # Load immutable version manifest
          MANIFEST=$(aws ssm get-parameter \
            --name "/nextgen-databridge/versions/${VERSION_ID}" \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          [[ -z "$MANIFEST" ]] && {
            echo "ERROR: Version manifest not found at /nextgen-databridge/versions/${VERSION_ID}"
            exit 1
          }
          echo "Manifest:"
          echo "$MANIFEST" | python3 -m json.tool

          SHA=$(echo "$MANIFEST"         | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")
          IMAGE_TAG=$(echo "$MANIFEST"   | python3 -c "import json,sys; d=json.load(sys.stdin); v=d.get('image_tag'); print(v if v else '')")
          DEPLOY_APPS=$(echo "$MANIFEST" | python3 -c "import json,sys; print(str(json.load(sys.stdin)['artifacts']['apps']).lower())")
          SYNC_DAGS=$(echo "$MANIFEST"   | python3 -c "import json,sys; print(str(json.load(sys.stdin)['artifacts']['dags']).lower())")
          SYNC_CONFIGS=$(echo "$MANIFEST"| python3 -c "import json,sys; print(str(json.load(sys.stdin)['artifacts']['configs']).lower())")

          echo "version_id=${VERSION_ID}"      >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"                    >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"        >> "$GITHUB_OUTPUT"
          echo "deploy_apps=${DEPLOY_APPS}"    >> "$GITHUB_OUTPUT"
          echo "sync_dags=${SYNC_DAGS}"        >> "$GITHUB_OUTPUT"
          echo "sync_configs=${SYNC_CONFIGS}"  >> "$GITHUB_OUTPUT"
          echo "role_arn=${ROLE}"              >> "$GITHUB_OUTPUT"
          echo "cluster_name=${CLUSTER}"       >> "$GITHUB_OUTPUT"
          echo "source_env=${SOURCE_ENV}"      >> "$GITHUB_OUTPUT"

  # ── 2a. Copy ECR images from dev → target account (skipped for non-app versions)
  copy-images:
    name: "Copy ECR Images → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.deploy_apps == 'true'
    outputs:
      target_registry: ${{ steps.push.outputs.target_registry }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pull images from dev ECR
        id: pull
        run: |
          DEV_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          DEV_REGISTRY="${DEV_ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "dev_registry=${DEV_REGISTRY}" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" | \
            docker login --username AWS --password-stdin "${DEV_REGISTRY}"
          TAG="${{ needs.resolve.outputs.image_tag }}"
          for svc in api ui transform; do
            docker pull "${DEV_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
          done

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push images to ${{ inputs.environment }} ECR
        id: push
        env:
          DEV_REGISTRY: ${{ steps.pull.outputs.dev_registry }}
          TAG: ${{ needs.resolve.outputs.image_tag }}
        run: |
          TARGET_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          TARGET_REGISTRY="${TARGET_ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "target_registry=${TARGET_REGISTRY}" >> "$GITHUB_OUTPUT"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" | \
            docker login --username AWS --password-stdin "${TARGET_REGISTRY}"
          for svc in api ui transform; do
            docker tag "${DEV_REGISTRY}/nextgen-databridge/${svc}:${TAG}" \
                       "${TARGET_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
            docker tag "${DEV_REGISTRY}/nextgen-databridge/${svc}:${TAG}" \
                       "${TARGET_REGISTRY}/nextgen-databridge/${svc}:${{ inputs.environment }}"
            docker push "${TARGET_REGISTRY}/nextgen-databridge/${svc}:${TAG}"
            docker push "${TARGET_REGISTRY}/nextgen-databridge/${svc}:${{ inputs.environment }}"
          done

  # ── 2b. Read-only infra validation (parallel with copy-images) ────────────────
  validate-infra:
    name: "Validate Infra — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check EKS cluster
        run: |
          CLUSTER="${{ needs.resolve.outputs.cluster_name }}"
          STATUS=$(aws eks describe-cluster \
            --name "$CLUSTER" --region "${{ env.AWS_REGION }}" \
            --query "cluster.status" --output text 2>/dev/null || echo "NOT_FOUND")
          [[ "$STATUS" == "ACTIVE" ]] \
            || { echo "ERROR: EKS cluster '$CLUSTER' is '${STATUS}'. Run infra-core.yml first."; exit 1; }
          echo "EKS cluster $CLUSTER: ACTIVE"

      - name: Check Secrets Manager
        run: |
          aws secretsmanager describe-secret \
            --secret-id "nextgen-databridge/connections/audit_db" \
            --region "${{ env.AWS_REGION }}" \
            --query "Name" --output text > /dev/null 2>&1 \
          || { echo "ERROR: Secret 'nextgen-databridge/connections/audit_db' not found. Run infra-audit-db.yml first."; exit 1; }
          echo "Secret nextgen-databridge/connections/audit_db: OK"

  # ── 3. Deploy — gated by GitHub Environment approval ─────────────────────────
  #
  # Checks out the exact SHA recorded in the version manifest (not main HEAD).
  # Steps are conditional on which artifacts the version includes.
  deploy:
    name: "Deploy — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: [resolve, copy-images, validate-infra]
    if: |
      always() &&
      needs.resolve.result        == 'success' &&
      needs.validate-infra.result == 'success' &&
      (needs.copy-images.result   == 'success' || needs.copy-images.result == 'skipped')
    environment: ${{ inputs.environment }}
    steps:
      # Checkout the exact commit that was tested in dev — never main HEAD
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-kubectl@v4
        if: needs.resolve.outputs.deploy_apps == 'true'

      - name: Update kubeconfig
        if: needs.resolve.outputs.deploy_apps == 'true'
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ needs.resolve.outputs.cluster_name }}"

      - name: Resolve dynamic values
        id: vals
        if: needs.resolve.outputs.deploy_apps == 'true'
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "account=${ACCOUNT}"    >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "nextgen-databridge/connections/audit_db" \
            --query SecretString --output text)
          DB_URL=$(python3 -c "import json,sys; print(json.loads(sys.argv[1])['url'])" "$DB_SECRET")
          echo "::add-mask::${DB_URL}"
          echo "database_url=${DB_URL}" >> "$GITHUB_OUTPUT"

          AIRFLOW_NAME="nextgen-databridge-${{ inputs.environment }}"
          AIRFLOW_URL=$(aws mwaa get-environment \
            --name "$AIRFLOW_NAME" \
            --query "Environment.WebserverUrl" \
            --output text 2>/dev/null || echo "pending")
          echo "airflow_url=https://${AIRFLOW_URL}" >> "$GITHUB_OUTPUT"

      - name: Sync DAGs to MWAA bucket
        if: needs.resolve.outputs.sync_dags == 'true'
        run: |
          MWAA_BUCKET="nextgen-databridge-mwaa-${{ inputs.environment }}"
          MWAA_BUCKET="$MWAA_BUCKET" bash airflow/deploy_to_mwaa.sh

      - name: Upload pipeline configs
        if: needs.resolve.outputs.sync_configs == 'true'
        run: |
          BUCKET="nextgen-databridge-pipeline-configs-${{ inputs.environment }}"
          aws s3 cp "configs/environments/${{ inputs.environment }}.json" \
            "s3://${BUCKET}/environments/${{ inputs.environment }}.json" 2>/dev/null || true
          for f in configs/pipelines/*.json; do
            aws s3 cp "$f" "s3://${BUCKET}/active/$(basename "$f")" 2>/dev/null || true
          done

      - name: Apply Kubernetes manifests
        if: needs.resolve.outputs.deploy_apps == 'true'
        env:
          IMAGE_TAG:    ${{ needs.resolve.outputs.image_tag }}
          REGISTRY:     ${{ steps.vals.outputs.registry }}
          ACCOUNT:      ${{ steps.vals.outputs.account }}
          DATABASE_URL: ${{ steps.vals.outputs.database_url }}
          AIRFLOW_URL:  ${{ steps.vals.outputs.airflow_url }}
          ENV:          ${{ inputs.environment }}
        run: |
          sed \
            -e "s|__ACCOUNT_ID__|${ACCOUNT}|g" \
            -e "s|__REGISTRY__|${REGISTRY}|g" \
            -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
            -e "s|__ENVIRONMENT__|${ENV}|g" \
            -e "s|__DUCKDB_BUCKET__|nextgen-databridge-duckdb-store-${ENV}|g" \
            -e "s|__PIPELINE_CONFIGS_BUCKET__|nextgen-databridge-pipeline-configs-${ENV}|g" \
            -e "s|__DATABASE_URL__|${DATABASE_URL}|g" \
            -e "s|__AIRFLOW_URL__|${AIRFLOW_URL}|g" \
            -e "s|__API_SECRET_KEY__|nextgen-databridge-${ENV}-${IMAGE_TAG}|g" \
            eks/manifests/platform.yaml | kubectl apply -f -

      - name: Wait for rollout
        if: needs.resolve.outputs.deploy_apps == 'true'
        run: |
          kubectl rollout status deployment/nextgen-databridge-api \
            -n nextgen-databridge --timeout=300s
          kubectl rollout status deployment/nextgen-databridge-ui \
            -n nextgen-databridge --timeout=180s

      - name: Rollback on failure
        if: failure() && needs.resolve.outputs.deploy_apps == 'true'
        run: |
          kubectl rollout undo deployment/nextgen-databridge-api -n nextgen-databridge || true
          kubectl rollout undo deployment/nextgen-databridge-ui  -n nextgen-databridge || true

  # ── 4. Smoke tests (only when app images were part of this version) ───────────
  smoke-test:
    name: "Smoke Tests — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: [resolve, deploy]
    if: needs.resolve.outputs.deploy_apps == 'true'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.resolve.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ needs.resolve.outputs.cluster_name }}"

      - name: Wait for pods ready
        run: |
          kubectl wait pod -n nextgen-databridge \
            --for=condition=Ready --selector=app=nextgen-databridge-api --timeout=180s

      - name: Health check — API
        run: |
          HOST=$(kubectl get svc nextgen-databridge-api -n nextgen-databridge \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [[ -n "$HOST" ]]; then
            for i in {1..12}; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                "http://${HOST}/health" 2>/dev/null || echo "000")
              [[ "$STATUS" == "200" ]] && { echo "Health check passed (attempt $i)"; break; }
              echo "Attempt $i: HTTP $STATUS — retrying in 15s..."
              sleep 15
            done
            [[ "$STATUS" == "200" ]] \
              || { echo "ERROR: ${{ inputs.environment }} API health check failed"; exit 1; }
          else
            echo "Load balancer not yet provisioned — pod-level check only"
            kubectl get pods -n nextgen-databridge
          fi

  # ── 5. Record deployment in SSM ───────────────────────────────────────────────
  record-deployment:
    name: "Record Deployment — ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    needs: [resolve, deploy, smoke-test]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'skipped')
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write deployment records to SSM
        run: |
          VERSION_ID="${{ needs.resolve.outputs.version_id }}"
          ENV="${{ inputs.environment }}"

          # Advance the environment pointer to this version
          aws ssm put-parameter \
            --name "/nextgen-databridge/deploy/${ENV}/latest-version" \
            --value "${VERSION_ID}" \
            --type String --overwrite

          # Audit record
          AUDIT="{\"version_id\":\"${VERSION_ID}\",\"deployed_at\":\"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\",\"deployed_by\":\"${{ github.actor }}\",\"run_id\":\"${{ github.run_id }}\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          aws ssm put-parameter \
            --name "/nextgen-databridge/deploy/${ENV}/last-deployment" \
            --value "$AUDIT" \
            --type String --overwrite

          # Backwards compatibility: keep image-tag parameter when apps were deployed
          IMAGE_TAG="${{ needs.resolve.outputs.image_tag }}"
          if [[ -n "$IMAGE_TAG" ]]; then
            aws ssm put-parameter \
              --name "/nextgen-databridge/image-tag/${ENV}" \
              --value "${IMAGE_TAG}" \
              --type String --overwrite
          fi

          echo "Recorded: ${ENV} → ${VERSION_ID}"

  # ── 6. Summary + notification ─────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [resolve, copy-images, validate-infra, deploy, smoke-test, record-deployment]
    if: always()
    steps:
      - name: Write summary
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SMOKE_STATUS="${{ needs.smoke-test.result }}"
          OVERALL=$([[ "$DEPLOY_STATUS" == "success" && ("$SMOKE_STATUS" == "success" || "$SMOKE_STATUS" == "skipped") ]] && echo "Success" || echo "Failed")

          {
            echo "## Promote — ${{ inputs.environment }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Version | \`${{ needs.resolve.outputs.version_id }}\` |"
            echo "| SHA | \`${{ needs.resolve.outputs.sha }}\` |"
            echo "| Image Tag | \`${{ needs.resolve.outputs.image_tag }}\` |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Apps Deployed | ${{ needs.resolve.outputs.deploy_apps }} |"
            echo "| DAGs Synced | ${{ needs.resolve.outputs.sync_dags }} |"
            echo "| Configs Synced | ${{ needs.resolve.outputs.sync_configs }} |"
            echo "| Overall | **${OVERALL}** |"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Copy Images | ${{ needs.copy-images.result }} |"
            echo "| Validate Infra | ${{ needs.validate-infra.result }} |"
            echo "| Deploy | ${{ needs.deploy.result }} |"
            echo "| Smoke Tests | ${{ needs.smoke-test.result }} |"
            echo "| Record Deployment | ${{ needs.record-deployment.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: always()
        continue-on-error: true   # no-op if SLACK_WEBHOOK_URL secret is not configured
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && format(':rocket: *{0} promoted* — version `{1}`', inputs.environment, needs.resolve.outputs.version_id) || format(':x: *{0} promotion failed* — version `{1}`', inputs.environment, needs.resolve.outputs.version_id) }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>",
              "attachments": [{
                "color": "${{ needs.deploy.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  { "title": "Version",  "value": "${{ needs.resolve.outputs.version_id }}", "short": true },
                  { "title": "Apps",     "value": "${{ needs.resolve.outputs.deploy_apps }}", "short": true },
                  { "title": "DAGs",     "value": "${{ needs.resolve.outputs.sync_dags }}",   "short": true },
                  { "title": "Configs",  "value": "${{ needs.resolve.outputs.sync_configs }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
