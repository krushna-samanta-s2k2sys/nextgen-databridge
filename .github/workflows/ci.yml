name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "~1.6"
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1

jobs:
  # ── Terraform validate + fmt ─────────────────────────────────────────────────
  terraform-validate:
    name: "Terraform — ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, mwaa, wwi]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init (no backend)
        working-directory: infra/terraform/${{ matrix.module }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: infra/terraform/${{ matrix.module }}
        run: terraform validate

      - name: terraform fmt check
        working-directory: infra/terraform/${{ matrix.module }}
        run: terraform fmt -check -recursive

  # ── Terraform security scan ──────────────────────────────────────────────────
  terraform-security:
    name: Terraform Security (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          soft_fail: true

  # ── Python lint ──────────────────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install ruff

      - name: Lint
        run: ruff check backend/ airflow/ eks/ tests/ --ignore E501

  # ── Python tests ─────────────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=backend --cov-report=xml --cov-report=term-missing \
            2>/dev/null || echo "No unit tests found"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Docker build + Trivy scan ────────────────────────────────────────────────
  docker-build-scan:
    name: "Build & Scan — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./backend
          - service: ui
            context: ./frontend
          - service: transform
            context: ./eks/jobs
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          load: true
          tags: scan-${{ matrix.service }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-${{ matrix.service }}:pr
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: container-${{ matrix.service }}

  # ── K8s manifest validation ──────────────────────────────────────────────────
  manifest-validate:
    name: Validate K8s Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all placeholders present
        run: |
          MANIFEST="eks/manifests/platform.yaml"
          MISSING=0
          for p in __ACCOUNT_ID__ __REGISTRY__ __IMAGE_TAG__ __ENVIRONMENT__ \
                   __DUCKDB_BUCKET__ __PIPELINE_CONFIGS_BUCKET__ \
                   __DATABASE_URL__ __AIRFLOW_URL__ __API_SECRET_KEY__; do
            if grep -q "$p" "$MANIFEST"; then
              echo "✓ $p"
            else
              echo "✗ Missing: $p"
              MISSING=$((MISSING + 1))
            fi
          done
          [[ $MISSING -eq 0 ]] || exit 1

      - name: Substitute placeholders for structural validation
        run: |
          sed \
            -e 's|__ACCOUNT_ID__|123456789012|g' \
            -e 's|__REGISTRY__|123456789012.dkr.ecr.us-east-1.amazonaws.com|g' \
            -e 's|__IMAGE_TAG__|sha-abc123def|g' \
            -e 's|__ENVIRONMENT__|dev|g' \
            -e 's|__DUCKDB_BUCKET__|nextgen-databridge-duckdb-store-dev|g' \
            -e 's|__PIPELINE_CONFIGS_BUCKET__|nextgen-databridge-pipeline-configs-dev|g' \
            -e 's|__DATABASE_URL__|postgresql://airflow:pass@host:5432/db|g' \
            -e 's|__AIRFLOW_URL__|https://airflow.example.com|g' \
            -e 's|__API_SECRET_KEY__|testsecretkey123|g' \
            eks/manifests/platform.yaml > /tmp/platform-resolved.yaml

      - name: Validate YAML parses cleanly
        run: |
          python3 -c "
          import yaml, sys
          docs = list(yaml.safe_load_all(open('/tmp/platform-resolved.yaml')))
          print(f'OK — {len(docs)} documents parsed')
          "
