name: Deploy — Dev

# Fires on PR merge to main (automatic) or manually via workflow_dispatch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DB_PASSWORD, MSSQL_PASSWORD
#   SLACK_WEBHOOK_URL (optional — omit to skip Slack notifications)

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy (for audit trail)"
        required: false
        default: "Manual on-demand deploy"

# Cancel an in-flight dev deployment when a newer one is triggered.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: dev
  AWS_REGION: us-east-1
  TF_VERSION: "~1.6"
  STATE_BUCKET: nextgen-databridge-terraform-state
  LOCK_TABLE: nextgen-databridge-terraform-locks
  CLUSTER_NAME: nextgen-databridge

jobs:
  # ── Guard: pass through on merge; always pass on manual dispatch ─────────────
  guard:
    name: Check Trigger
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - if: github.event_name == 'workflow_dispatch'
        run: echo "Manual deploy triggered — ${{ inputs.reason }}"
      - if: github.event_name == 'pull_request'
        run: echo "PR #${{ github.event.pull_request.number }} merged — deploying to dev"

  # ── 1. Build & push all images (parallel matrix) ────────────────────────────
  build:
    name: "Build & Push — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./backend
          - service: ui
            context: ./frontend
          - service: transform
            context: ./eks/jobs
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: tag
        run: echo "image_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "nextgen-databridge/${{ matrix.service }}" \
            --region ${{ env.AWS_REGION }} 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "nextgen-databridge/${{ matrix.service }}" \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/nextgen-databridge/${{ matrix.service }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/nextgen-databridge/${{ matrix.service }}:${{ env.ENVIRONMENT }}
            ${{ steps.ecr-login.outputs.registry }}/nextgen-databridge/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # Aggregate build outputs (matrix jobs can't share outputs directly)
  build-meta:
    name: Build Metadata
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image_tag: ${{ steps.out.outputs.image_tag }}
      registry: ${{ steps.out.outputs.registry }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve outputs
        id: out
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "image_tag=sha-${{ github.sha }}"                                       >> "$GITHUB_OUTPUT"
          echo "registry=${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"      >> "$GITHUB_OUTPUT"

  # ── 2. Bootstrap Terraform backend ──────────────────────────────────────────
  bootstrap:
    name: Bootstrap Terraform Backend
    runs-on: ubuntu-latest
    needs: build-meta
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Ensure state bucket + DynamoDB lock table
        run: |
          BUCKET="${{ env.STATE_BUCKET }}"
          TABLE="${{ env.LOCK_TABLE }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region us-east-1
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              '{"BlockPublicAcls":true,"IgnorePublicAcls":true,"BlockPublicPolicy":true,"RestrictPublicBuckets":true}'
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE" --region us-east-1 2>/dev/null; then
            aws dynamodb create-table \
              --table-name "$TABLE" --region us-east-1 \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE" --region us-east-1
          fi

  # ── 3. Core infrastructure ───────────────────────────────────────────────────
  deploy-core:
    name: Deploy Core Infrastructure
    runs-on: ubuntu-latest
    needs: [build-meta, bootstrap]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/core
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ env.ENVIRONMENT }}/core/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/core
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Upload environment + pipeline configs
        run: |
          BUCKET="nextgen-databridge-pipeline-configs-${{ env.ENVIRONMENT }}"
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="nextgen-databridge-pipeline-configs-${{ env.ENVIRONMENT }}-${ACCT}"
          aws s3 cp configs/environments/${{ env.ENVIRONMENT }}.json \
            s3://${BUCKET}/environments/${{ env.ENVIRONMENT }}.json 2>/dev/null || true
          for f in configs/pipelines/*.json; do
            aws s3 cp "$f" s3://${BUCKET}/active/$(basename "$f") 2>/dev/null || true
          done

  # ── 4. WideWorldImporters + MWAA (parallel after core) ──────────────────────
  deploy-wwi:
    name: Deploy WideWorldImporters SQL Server
    runs-on: ubuntu-latest
    needs: [build-meta, deploy-core]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/wwi
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ env.ENVIRONMENT }}/wwi/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/wwi
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

  deploy-mwaa:
    name: Deploy MWAA Airflow
    runs-on: ubuntu-latest
    needs: [build-meta, deploy-core]
    outputs:
      mwaa_url: ${{ steps.mwaa-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        working-directory: infra/terraform/mwaa
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ env.ENVIRONMENT }}/mwaa/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/mwaa
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_mssql_password: ${{ secrets.MSSQL_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Upload DAGs to MWAA bucket
        run: |
          MWAA_BUCKET=$(cd infra/terraform/mwaa && terraform output -raw mwaa_bucket)
          MWAA_BUCKET="$MWAA_BUCKET" bash airflow/deploy_to_mwaa.sh

      - name: Get MWAA webserver URL
        id: mwaa-url
        run: |
          URL=$(aws mwaa get-environment \
            --name "nextgen-databridge-${{ env.ENVIRONMENT }}" \
            --query "Environment.WebserverUrl" \
            --output text 2>/dev/null || echo "pending")
          echo "url=https://${URL}" >> "$GITHUB_OUTPUT"

  # ── 5. Deploy EKS applications ───────────────────────────────────────────────
  deploy-apps:
    name: Deploy EKS Applications
    runs-on: ubuntu-latest
    needs: [build-meta, deploy-core, deploy-mwaa]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Resolve dynamic values
        id: resolve
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "account=${ACCOUNT}"     >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}"  >> "$GITHUB_OUTPUT"

          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "nextgen-databridge/connections/audit_db" \
            --query SecretString --output text 2>/dev/null || echo '{"url":""}')
          DB_URL=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); print(d.get('url',''))" "$DB_SECRET")
          echo "::add-mask::${DB_URL}"
          echo "database_url=${DB_URL}" >> "$GITHUB_OUTPUT"

          MWAA_URL="${{ needs.deploy-mwaa.outputs.mwaa_url }}"
          echo "airflow_url=${MWAA_URL}" >> "$GITHUB_OUTPUT"

          DUCKDB_BUCKET="nextgen-databridge-duckdb-store-${{ env.ENVIRONMENT }}-${ACCOUNT}"
          CONFIGS_BUCKET="nextgen-databridge-pipeline-configs-${{ env.ENVIRONMENT }}-${ACCOUNT}"
          echo "duckdb_bucket=${DUCKDB_BUCKET}"    >> "$GITHUB_OUTPUT"
          echo "configs_bucket=${CONFIGS_BUCKET}"  >> "$GITHUB_OUTPUT"

      - name: Apply Kubernetes manifests
        env:
          IMAGE_TAG: ${{ needs.build-meta.outputs.image_tag }}
          REGISTRY: ${{ steps.resolve.outputs.registry }}
          ACCOUNT: ${{ steps.resolve.outputs.account }}
          DATABASE_URL: ${{ steps.resolve.outputs.database_url }}
          AIRFLOW_URL: ${{ steps.resolve.outputs.airflow_url }}
          DUCKDB_BUCKET: ${{ steps.resolve.outputs.duckdb_bucket }}
          CONFIGS_BUCKET: ${{ steps.resolve.outputs.configs_bucket }}
        run: |
          sed \
            -e "s|__ACCOUNT_ID__|${ACCOUNT}|g" \
            -e "s|__REGISTRY__|${REGISTRY}|g" \
            -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
            -e "s|__ENVIRONMENT__|${{ env.ENVIRONMENT }}|g" \
            -e "s|__DUCKDB_BUCKET__|${DUCKDB_BUCKET}|g" \
            -e "s|__PIPELINE_CONFIGS_BUCKET__|${CONFIGS_BUCKET}|g" \
            -e "s|__DATABASE_URL__|${DATABASE_URL}|g" \
            -e "s|__AIRFLOW_URL__|${AIRFLOW_URL}|g" \
            -e "s|__API_SECRET_KEY__|nextgen-databridge-${{ env.ENVIRONMENT }}-${{ github.sha }}|g" \
            eks/manifests/platform.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/nextgen-databridge-api \
            -n nextgen-databridge --timeout=300s
          kubectl rollout status deployment/nextgen-databridge-ui \
            -n nextgen-databridge --timeout=180s

      - name: Print service endpoints
        run: |
          kubectl get svc -n nextgen-databridge \
            -o custom-columns='NAME:.metadata.name,EXTERNAL-IP:.status.loadBalancer.ingress[0].hostname,PORT:.spec.ports[0].port' \
            2>/dev/null || true

  # ── 6. Smoke tests ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-meta, deploy-apps]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}

      - name: Wait for pods to be ready
        run: |
          kubectl wait pod \
            -n nextgen-databridge \
            --for=condition=Ready \
            --selector=app=nextgen-databridge-api \
            --timeout=120s

          kubectl wait pod \
            -n nextgen-databridge \
            --for=condition=Ready \
            --selector=app=nextgen-databridge-ui \
            --timeout=120s

      - name: Health check — API
        run: |
          API_HOST=$(kubectl get svc nextgen-databridge-api-lb \
            -n nextgen-databridge \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          if [[ -n "$API_HOST" ]]; then
            for i in {1..10}; do
              HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                "http://${API_HOST}/health" 2>/dev/null || echo "000")
              if [[ "$HTTP_STATUS" == "200" ]]; then
                echo "API health check passed (attempt $i)"
                break
              fi
              echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 15s..."
              sleep 15
            done
            [[ "$HTTP_STATUS" == "200" ]] || { echo "API health check failed"; exit 1; }
          else
            echo "Load balancer not yet provisioned — skipping external health check"
            kubectl get pods -n nextgen-databridge
          fi

  # ── 7. Record image tag in SSM for promotion ─────────────────────────────────
  record-image-tag:
    name: Record Image Tag
    runs-on: ubuntu-latest
    needs: [build-meta, smoke-test]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write image tag to SSM
        run: |
          aws ssm put-parameter \
            --name "/nextgen-databridge/image-tag/dev" \
            --value "${{ needs.build-meta.outputs.image_tag }}" \
            --type String \
            --overwrite
          aws ssm put-parameter \
            --name "/nextgen-databridge/deploy-sha/dev" \
            --value "${{ github.sha }}" \
            --type String \
            --overwrite
          echo "Recorded image tag: ${{ needs.build-meta.outputs.image_tag }}"

  # ── 8. Job summary + notification ────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-meta, deploy-core, deploy-wwi, deploy-mwaa, deploy-apps, smoke-test, record-image-tag]
    if: always()
    steps:
      - name: Write job summary
        run: |
          OVERALL=$([[ \
            "${{ needs.deploy-apps.result }}" == "success" && \
            "${{ needs.smoke-test.result }}" == "success" \
          ]] && echo "✅ Success" || echo "❌ Failed")
          {
            echo "## Dev Deployment Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ env.ENVIRONMENT }}\` |"
            echo "| Image Tag | \`${{ needs.build-meta.outputs.image_tag }}\` |"
            echo "| Commit | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Overall | ${OVERALL} |"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Build | ${{ needs.build-meta.result }} |"
            echo "| Core Infra | ${{ needs.deploy-core.result }} |"
            echo "| WWI | ${{ needs.deploy-wwi.result }} |"
            echo "| MWAA | ${{ needs.deploy-mwaa.result }} |"
            echo "| EKS Apps | ${{ needs.deploy-apps.result }} |"
            echo "| Smoke Tests | ${{ needs.smoke-test.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true   # no-op if SLACK_WEBHOOK_URL secret is not configured
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Dev deployment failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Author", "value": "${{ github.actor }}", "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
