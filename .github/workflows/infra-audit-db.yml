name: Infrastructure — Audit DB

# Manages the PostgreSQL RDS audit database and creates all audit tables, views,
# and stored procedures via scripts/create_audit_tables.py.
#
# Prerequisite: infra-core.yml must have been applied first (VPC must exist).
#
# Password handling:
#   Provide db_password as a workflow input for first-time or one-off deployments.
#   For routine use, configure the DB_PASSWORD repository secret instead and leave
#   the input blank — the workflow falls back to the secret automatically.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, production, dr]
      action:
        description: Action to perform
        required: true
        type: choice
        options: [plan, apply, destroy]
      db_password:
        description: "PostgreSQL password (user: airflow). Leave blank to use repository secret DB_PASSWORD."
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "~1.6"
  PRIMARY_REGION: us-east-1
  DR_REGION: us-west-2
  STATE_BUCKET: nextgen-databridge-terraform-state
  LOCK_TABLE: nextgen-databridge-terraform-locks
  ROLE_ARN_DEV:        arn:aws:iam::877707676590:role/nextgen-databridge-github-actions-dev
  ROLE_ARN_STAGING:    arn:aws:iam::STAGING_ACCOUNT_ID:role/nextgen-databridge-github-actions-staging
  ROLE_ARN_PROD:       arn:aws:iam::PROD_ACCOUNT_ID:role/nextgen-databridge-github-actions-production
  ROLE_ARN_DR:         arn:aws:iam::DR_ACCOUNT_ID:role/nextgen-databridge-github-actions-dr

jobs:
  setup:
    name: "Setup (${{ inputs.environment }} / ${{ inputs.action }})"
    runs-on: ubuntu-latest
    outputs:
      aws_region: ${{ steps.cfg.outputs.aws_region }}
      role_arn:   ${{ steps.cfg.outputs.role_arn }}
    steps:
      - name: Resolve config
        id: cfg
        run: |
          case "${{ inputs.environment }}" in
            dev)        ROLE="${{ env.ROLE_ARN_DEV }}" ;;
            staging)    ROLE="${{ env.ROLE_ARN_STAGING }}" ;;
            production) ROLE="${{ env.ROLE_ARN_PROD }}" ;;
            dr)         ROLE="${{ env.ROLE_ARN_DR }}" ;;
          esac
          REGION=$([[ "${{ inputs.environment }}" == "dr" ]] \
            && echo "${{ env.DR_REGION }}" \
            || echo "${{ env.PRIMARY_REGION }}")
          echo "aws_region=${REGION}" >> "$GITHUB_OUTPUT"
          echo "role_arn=${ROLE}"     >> "$GITHUB_OUTPUT"

  plan:
    name: Plan — audit-db
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve DB password
        id: pw
        run: |
          PW="${{ inputs.db_password }}"
          if [[ -z "$PW" ]]; then
            PW="${{ secrets.DB_PASSWORD }}"
          fi
          if [[ -z "$PW" ]] && [[ "${{ inputs.action }}" != "plan" ]]; then
            echo "ERROR: DB password is required for apply/destroy."
            echo "Provide it via the db_password workflow input or the DB_PASSWORD repository secret."
            exit 1
          fi
          echo "::add-mask::$PW"
          echo "value=$PW" >> "$GITHUB_OUTPUT"

      - name: terraform init
        working-directory: infra/terraform/audit-db
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/audit-db/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform plan
        working-directory: infra/terraform/audit-db
        env:
          TF_VAR_db_password: ${{ steps.pw.outputs.value }}
        run: |
          set -o pipefail
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="aws_region=${{ needs.setup.outputs.aws_region }}" \
            ${{ inputs.action == 'destroy' && '-destroy' || '' }} \
            -out=tfplan-audit-db.bin -no-color 2>&1 | tee tfplan-audit-db.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-audit-db
          path: |
            infra/terraform/audit-db/tfplan-audit-db.bin
            infra/terraform/audit-db/tfplan-audit-db.txt
          retention-days: 1

      - name: Post plan summary
        if: always()
        run: |
          {
            echo "### Terraform Plan — audit-db \`${{ inputs.environment }}\`"
            echo '```hcl'
            cat infra/terraform/audit-db/tfplan-audit-db.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: "${{ inputs.action == 'destroy' && 'Destroy' || 'Apply' }} — audit-db"
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: inputs.action != 'plan' && needs.plan.result == 'success'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.setup.outputs.role_arn }}
          aws-region: ${{ needs.setup.outputs.aws_region }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-audit-db
          path: infra/terraform/audit-db/

      - name: terraform init
        working-directory: infra/terraform/audit-db
        run: |
          terraform init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}" \
            -backend-config="key=nextgen-databridge/${{ inputs.environment }}/audit-db/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ env.LOCK_TABLE }}"

      - name: terraform apply
        working-directory: infra/terraform/audit-db
        run: terraform apply -auto-approve tfplan-audit-db.bin

      # After apply, create all audit tables, enums, and indexes.
      # The RDS SG only allows VPC CIDR by default, so we temporarily open port 5432
      # to the runner IP and clean up with a trap regardless of success/failure.
      - name: Create audit schema
        if: inputs.action == 'apply'
        run: |
          set -euo pipefail

          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)
          RUNNER_CIDR="${RUNNER_IP}/32"

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=nextgen-databridge-postgres" \
            --query 'SecurityGroups[0].GroupId' --output text)

          cleanup() {
            aws ec2 revoke-security-group-ingress \
              --group-id "$SG_ID" \
              --protocol tcp --port 5432 --cidr "$RUNNER_CIDR" 2>/dev/null || true
          }
          trap cleanup EXIT

          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp --port 5432 --cidr "$RUNNER_CIDR" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=ci-runner,Value=true}]"

          pip install --quiet sqlalchemy psycopg2-binary
          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "nextgen-databridge/connections/audit_db" \
            --query SecretString --output text)
          DB_URL=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); print(d['url'])" "$DB_SECRET")
          echo "::add-mask::$DB_URL"
          DATABASE_URL="$DB_URL" python scripts/create_audit_tables.py
          echo "Audit schema applied successfully."

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [setup, plan, apply]
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "## Audit DB — ${{ inputs.action }}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Region | \`${{ needs.setup.outputs.aws_region }}\` |"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Plan | ${{ needs.plan.result }} |"
            echo "| Apply/Destroy | ${{ needs.apply.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
