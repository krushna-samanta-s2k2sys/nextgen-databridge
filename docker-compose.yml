version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'nextgen-databridge-secret-key-change-in-prod'
    # Custom NextGenDatabridge env
    NEXTGEN_DATABRIDGE_AUDIT_DB_URL: postgresql+psycopg2://nextgen_databridge:nextgen_databridge@postgres:5432/nextgen_databridge_audit
    NEXTGEN_DATABRIDGE_PIPELINE_CONFIGS_BUCKET: s3://nextgen-databridge-pipeline-configs
    NEXTGEN_DATABRIDGE_DUCKDB_BUCKET: s3://nextgen-databridge-duckdb-store
    NEXTGEN_DATABRIDGE_API_URL: http://nextgen-databridge-api:8000
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-localstack}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-localstack}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    AWS_ENDPOINT_URL: http://localstack:4566
    PYTHONPATH: /opt/airflow/plugins:/opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./airflow/logs:/opt/airflow/logs
    - ./backend:/opt/airflow/nextgen_databridge_backend
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      POSTGRES_MULTIPLE_DATABASES: "airflow,nextgen_databridge_audit,nextgen_databridge_config"
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,secretsmanager
      DEBUG: 0
      PERSISTENCE: 1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-localstack.sh

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install duckdb boto3 psycopg2-binary sqlalchemy kafka-python google-cloud-pubsub cx_Oracle pyodbc pandas pyarrow fastapi uvicorn pydantic great_expectations
        airflow db init
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@nextgen-databridge.io --password admin
        airflow connections add 'nextgen_databridge_postgres' --conn-type 'postgres' --conn-host 'postgres' --conn-login 'nextgen_databridge' --conn-password 'nextgen_databridge' --conn-port 5432 --conn-schema 'nextgen_databridge_audit'
    depends_on:
      <<: *airflow-common-depends-on

  nextgen-databridge-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nextgen_databridge:nextgen_databridge@postgres:5432/nextgen_databridge_audit
      CONFIG_DB_URL: postgresql+asyncpg://nextgen_databridge:nextgen_databridge@postgres:5432/nextgen_databridge_config
      AIRFLOW_URL: http://airflow-webserver:8080
      AIRFLOW_USER: admin
      AIRFLOW_PASS: admin
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: localstack
      AWS_SECRET_ACCESS_KEY: localstack
      DUCKDB_S3_BUCKET: nextgen-databridge-duckdb-store
      SECRET_KEY: nextgen-databridge-jwt-secret-change-in-prod
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  nextgen-databridge-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    depends_on:
      - nextgen-databridge-api

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources

volumes:
  postgres-db-volume:
  localstack-data:
  grafana-data:
